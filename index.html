<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#1a1a2e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Mi Vida"/>
<title>Mi Vida — Finanzas & Rutina</title>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#232342;--bg4:#2d2d50;
  --text:#f0f0ff;--text2:#a0a0c0;--text3:#6060a0;
  --green:#00d4a0;--green2:#00a880;--green-bg:rgba(0,212,160,.12);
  --blue:#4a9eff;--blue-bg:rgba(74,158,255,.12);
  --red:#ff6b7a;--red-bg:rgba(255,107,122,.12);
  --amber:#ffb347;--amber-bg:rgba(255,179,71,.12);
  --purple:#b47aff;--purple-bg:rgba(180,122,255,.12);
  --pink:#ff7ab8;--pink-bg:rgba(255,122,184,.12);
  --radius:14px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:80px;font-size:15px}
/* NAV */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg4);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 0 12px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;font-weight:500;transition:color .2s}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:20px;line-height:1}
/* HEADER */
.page-header{padding:20px 16px 12px;background:linear-gradient(180deg,var(--bg2),transparent)}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.page-header p{font-size:13px;color:var(--text2);margin-top:2px}
/* SECTIONS */
.section{display:none;padding:0 12px;animation:fadeIn .2s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.metric{background:var(--bg2);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;border:1px solid var(--bg4)}
.metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-value{font-size:18px;font-weight:700}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title span{font-size:14px}
/* ITEMS */
.item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bg3)}
.item:last-child{border-bottom:none}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.item-name{flex:1;font-size:14px}
.item-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.item-amount{font-size:14px;font-weight:600;min-width:70px;text-align:right}
.item-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;transition:color .15s}
.item-del:hover{color:var(--red)}
.empty{font-size:13px;color:var(--text3);padding:8px 0;text-align:center}
/* ADD FORM */
.add-row{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bg3)}
.add-row input{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:13px;outline:none;transition:border .15s}
.add-row input:focus{border-color:var(--green)}
.add-row input[type=text]{flex:2}
.add-row input[type=number]{flex:1;min-width:80px}
.add-btn{background:var(--green);border:none;border-radius:var(--radius-sm);color:#000;font-weight:700;font-size:18px;width:38px;flex-shrink:0;cursor:pointer;transition:opacity .15s}
.add-btn:active{opacity:.7}
/* CHART */
.chart-wrap{position:relative;width:100%;height:200px;margin:8px 0}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
/* AREAS */
.area-card{border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid}
.area-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.area-emoji{font-size:22px;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07)}
.area-info{flex:1}
.area-name{font-size:15px;font-weight:600}
.area-time{font-size:12px;color:var(--text2);margin-top:1px}
.area-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0}
.progress{background:rgba(255,255,255,.1);border-radius:20px;height:4px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;transition:width .4s ease}
.task-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.task-item:last-child{border-bottom:none}
.task-cb{width:18px;height:18px;border-radius:5px;border:2px solid;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-cb.checked{background:var(--green);border-color:var(--green)}
.task-cb.checked::after{content:'✓';font-size:11px;color:#000;font-weight:700}
.task-name{flex:1;font-size:13px;cursor:pointer;transition:opacity .15s}
.task-name.done{opacity:.4;text-decoration:line-through}
.task-del-btn{background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:16px;padding:0 4px;transition:color .15s}
.task-del-btn:hover{color:var(--red)}
.add-task{display:flex;gap:6px;margin-top:10px}
.add-task input{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:13px;outline:none}
.add-task input:focus{border-color:rgba(255,255,255,.3)}
.add-task button{background:rgba(255,255,255,.1);border:none;border-radius:var(--radius-sm);color:var(--text);font-size:18px;width:34px;cursor:pointer}
/* RESUMEN */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bg3)}
.sum-row:last-child{border-bottom:none}
.sum-area{display:flex;align-items:center;gap:8px;font-size:14px}
.sum-pct{font-size:14px;font-weight:600}
/* AI BTN */
.ai-btn{width:100%;padding:14px;border-radius:var(--radius);border:1px solid var(--green);background:var(--green-bg);color:var(--green);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;transition:all .2s}
.ai-btn:active{opacity:.7}
/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--bg3);color:var(--text);padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;opacity:0;transition:all .3s;z-index:999;border:1px solid var(--bg4);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:16px;margin-bottom:8px}
.donut-chart{position:relative;width:120px;height:120px;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.donut-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.donut-value{font-size:16px;font-weight:700}
/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- FINANZAS -->
<div class="section active" id="sec-finanzas">
  <div class="page-header">
    <h1>Finanzas</h1>
    <p id="fin-date"></p>
  </div>
  <div class="metrics" id="metrics-box">
    <div class="metric"><div class="metric-label">Ingresos</div><div class="metric-value" id="m-income" style="color:var(--green)">$0</div></div>
    <div class="metric"><div class="metric-label">Gastos</div><div class="metric-value" id="m-expense" style="color:var(--red)">$0</div></div>
    <div class="metric"><div class="metric-label">Balance</div><div class="metric-value" id="m-balance">$0</div></div>
  </div>

  <div class="card">
    <div class="card-title"><span>💰</span> Ingresos</div>
    <div id="income-list"></div>
    <div class="add-row">
      <input type="text" id="inc-name" placeholder="Concepto"/>
      <input type="number" id="inc-amt" placeholder="Monto" min="0"/>
      <button class="add-btn" onclick="addEntry('income')">+</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>🔒</span> Gastos fijos</div>
    <div id="fixed-list"></div>
    <div class="add-row">
      <input type="text" id="fix-name" placeholder="Concepto"/>
      <input type="number" id="fix-amt" placeholder="Monto" min="0"/>
      <button class="add-btn" onclick="addEntry('fixed')">+</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>🌊</span> Gastos variables</div>
    <div id="variable-list"></div>
    <div class="add-row">
      <input type="text" id="var-name" placeholder="Concepto"/>
      <input type="number" id="var-amt" placeholder="Monto" min="0"/>
      <button class="add-btn" onclick="addEntry('variable')">+</button>
    </div>
  </div>
</div>

<!-- RUTINA -->
<div class="section" id="sec-rutina">
  <div class="page-header">
    <h1>Rutina de hoy</h1>
    <p id="rut-date"></p>
  </div>
  <div id="areas-container"></div>
</div>

<!-- GRÁFICAS -->
<div class="section" id="sec-graficas">
  <div class="page-header"><h1>Gráficas</h1><p>Vista consolidada</p></div>

  <div class="card">
    <div class="card-title"><span>📊</span> Distribución de dinero</div>
    <div class="donut-wrap">
      <div class="donut-chart">
        <canvas id="donutChart" role="img" aria-label="Grafico circular de finanzas"></canvas>
        <div class="donut-center">
          <div class="donut-label">Balance</div>
          <div class="donut-value" id="donut-center-val">$0</div>
        </div>
      </div>
      <div class="legend" id="donut-legend" style="flex-direction:column;gap:8px"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>📈</span> Ingresos vs Gastos</div>
    <div class="chart-wrap"><canvas id="barChart" role="img" aria-label="Grafico de barras ingresos vs gastos"></canvas></div>
  </div>

  <div class="card">
    <div class="card-title"><span>✅</span> Progreso de tareas</div>
    <div id="task-progress"></div>
  </div>
</div>

<!-- RESUMEN -->
<div class="section" id="sec-resumen">
  <div class="page-header"><h1>Mi resumen</h1><p id="res-date"></p></div>

  <div class="card">
    <div class="card-title"><span>💡</span> Panorama financiero</div>
    <div id="fin-summary"></div>
  </div>
  <div class="card">
    <div class="card-title"><span>🗓</span> Tareas del día</div>
    <div id="rut-summary"></div>
  </div>
  <button class="ai-btn" onclick="goAI()">✦ Análisis con IA</button>
</div>

<!-- NAVBAR -->
<div class="nav-bar">
  <button class="nav-btn active" onclick="switchTab('finanzas',this)"><span class="nav-icon">💰</span>Finanzas</button>
  <button class="nav-btn" onclick="switchTab('rutina',this)"><span class="nav-icon">🗓</span>Rutina</button>
  <button class="nav-btn" onclick="switchTab('graficas',this)"><span class="nav-icon">📊</span>Gráficas</button>
  <button class="nav-btn" onclick="switchTab('resumen',this)"><span class="nav-icon">✦</span>Resumen</button>
</div>

<script>
const AREAS=[
  {id:'trabajo',label:'Trabajo',emoji:'💼',color:'#4a9eff',border:'rgba(74,158,255,.3)',bg:'rgba(74,158,255,.07)',timeStart:'08:00',timeEnd:'12:00'},
  {id:'universidad',label:'Universidad',emoji:'📚',color:'#00d4a0',border:'rgba(0,212,160,.3)',bg:'rgba(0,212,160,.07)',timeStart:'14:00',timeEnd:'17:00'},
  {id:'personal',label:'Personal',emoji:'🌟',color:'#b47aff',border:'rgba(180,122,255,.3)',bg:'rgba(180,122,255,.07)',timeStart:'18:00',timeEnd:'20:00'},
  {id:'salud',label:'Salud / Deporte',emoji:'🏃',color:'#ff7ab8',border:'rgba(255,122,184,.3)',bg:'rgba(255,122,184,.07)',timeStart:'06:00',timeEnd:'07:00'},
];

function loadState(){
  try{return JSON.parse(localStorage.getItem('vidaApp')||'null');}catch{return null;}
}
function saveState(){localStorage.setItem('vidaApp',JSON.stringify(state));}

const stored=loadState();
const state=stored||{income:[],fixed:[],variable:[],tasks:{}};
AREAS.forEach(a=>{if(!state.tasks[a.id])state.tasks[a.id]=[];});

// DATE
const D=new Date();
const DIAS=['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const dateStr=`${DIAS[D.getDay()]}, ${D.getDate()} de ${MESES[D.getMonth()]}`;
['fin-date','rut-date','res-date'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=dateStr;});

function fmt(n){
  const abs=Math.abs(Math.round(n));
  const s=abs.toLocaleString('es-CO');
  return (n<0?'-':'')+'$'+s;
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function calcTotals(){
  const inc=state.income.reduce((s,i)=>s+i.amt,0);
  const fix=state.fixed.reduce((s,i)=>s+i.amt,0);
  const vari=state.variable.reduce((s,i)=>s+i.amt,0);
  const exp=fix+vari;
  const bal=inc-exp;
  document.getElementById('m-income').textContent=fmt(inc);
  document.getElementById('m-expense').textContent=fmt(exp);
  const bEl=document.getElementById('m-balance');
  bEl.textContent=fmt(bal);
  bEl.style.color=bal>=0?'var(--green)':'var(--red)';
  return{inc,fix,vari,exp,bal};
}

function renderList(type){
  const cfg={income:{id:'income-list',dot:'#00d4a0',badge:'Ingreso',bc:'rgba(0,212,160,.15)',tc:'#00d4a0'},fixed:{id:'fixed-list',dot:'#4a9eff',badge:'Fijo',bc:'rgba(74,158,255,.15)',tc:'#4a9eff'},variable:{id:'variable-list',dot:'#ff6b7a',badge:'Variable',bc:'rgba(255,107,122,.15)',tc:'#ff6b7a'}};
  const c=cfg[type];
  const el=document.getElementById(c.id);el.innerHTML='';
  if(!state[type].length){el.innerHTML=`<div class="empty">Sin registros aún</div>`;return;}
  state[type].forEach((item,i)=>{
    const d=document.createElement('div');d.className='item';
    d.innerHTML=`<div class="item-dot" style="background:${c.dot}"></div><span class="item-name">${item.name}</span><span class="item-badge" style="background:${c.bc};color:${c.tc}">${c.badge}</span><span class="item-amount" style="color:${c.dot}">${fmt(item.amt)}</span><button class="item-del" onclick="removeEntry('${type}',${i})">×</button>`;
    el.appendChild(d);
  });
}

function addEntry(type){
  const p={income:'inc',fixed:'fix',variable:'var'}[type];
  const nameEl=document.getElementById(p+'-name');
  const amtEl=document.getElementById(p+'-amt');
  const name=nameEl.value.trim();
  const amt=parseFloat(amtEl.value);
  if(!name||isNaN(amt)||amt<=0){toast('Completa nombre y monto');return;}
  state[type].push({name,amt});
  nameEl.value='';amtEl.value='';
  saveState();renderList(type);calcTotals();
  toast('Agregado ✓');
}

function removeEntry(type,i){
  state[type].splice(i,1);
  saveState();renderList(type);calcTotals();
}

function renderAreas(){
  const c=document.getElementById('areas-container');c.innerHTML='';
  AREAS.forEach(area=>{
    const tasks=state.tasks[area.id]||[];
    const done=tasks.filter(t=>t.done).length;
    const total=tasks.length;
    const pct=total?Math.round(done/total*100):0;
    const div=document.createElement('div');
    div.className='area-card';
    div.style.background=area.bg;div.style.borderColor=area.border;
    div.innerHTML=`
      <div class="area-header">
        <div class="area-emoji">${area.emoji}</div>
        <div class="area-info">
          <div class="area-name">${area.label}</div>
          <div class="area-time">${area.timeStart} – ${area.timeEnd}</div>
        </div>
        <div class="area-badge" style="background:${area.bg};color:${area.color};border:1px solid ${area.border}">${done}/${total}</div>
      </div>
      <div class="progress"><div class="progress-fill" style="width:${pct}%;background:${area.color}"></div></div>
      <div id="tlist-${area.id}"></div>
      <div class="add-task">
        <input type="text" id="ti-${area.id}" placeholder="Agregar tarea..." onkeydown="if(event.key==='Enter')addTask('${area.id}')"/>
        <button onclick="addTask('${area.id}')">+</button>
      </div>`;
    c.appendChild(div);
    renderTasks(area.id);
  });
}

function renderTasks(areaId){
  const area=AREAS.find(a=>a.id===areaId);
  const tasks=state.tasks[areaId]||[];
  const el=document.getElementById('tlist-'+areaId);if(!el)return;
  el.innerHTML='';
  if(!tasks.length){el.innerHTML='<div class="empty" style="padding:6px 0">Sin tareas aún</div>';return;}
  tasks.forEach((t,i)=>{
    const row=document.createElement('div');row.className='task-item';
    row.innerHTML=`
      <div class="task-cb ${t.done?'checked':''}" style="border-color:${t.done?area.color:area.color}" onclick="toggleTask('${areaId}',${i})"></div>
      <span class="task-name${t.done?' done':''}" onclick="toggleTask('${areaId}',${i})">${t.name}</span>
      <button class="task-del-btn" onclick="removeTask('${areaId}',${i})">×</button>`;
    el.appendChild(row);
  });
}

function addTask(areaId){
  const inp=document.getElementById('ti-'+areaId);
  const name=inp.value.trim();if(!name)return;
  state.tasks[areaId].push({name,done:false});
  inp.value='';saveState();renderAreas();
}

function toggleTask(areaId,i){
  state.tasks[areaId][i].done=!state.tasks[areaId][i].done;
  saveState();renderAreas();updateGraficas();
}

function removeTask(areaId,i){
  state.tasks[areaId].splice(i,1);
  saveState();renderAreas();
}

let donutInst=null,barInst=null;
function updateGraficas(){
  const {inc,fix,vari,exp,bal}=calcTotals();
  // donut
  const canvas=document.getElementById('donutChart');
  if(canvas){
    if(donutInst)donutInst.destroy();
    const total=inc||1;
    donutInst=new Chart(canvas,{
      type:'doughnut',
      data:{
        labels:['Disponible','G. Fijos','G. Variables'],
        datasets:[{data:[Math.max(bal,0),fix,vari],backgroundColor:['#00d4a0','#4a9eff','#ff6b7a'],borderWidth:0,hoverOffset:4}]
      },
      options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.raw)}}}}
    });
    document.getElementById('donut-center-val').textContent=fmt(bal);
    document.getElementById('donut-center-val').style.color=bal>=0?'#00d4a0':'#ff6b7a';
    const legEl=document.getElementById('donut-legend');
    if(legEl){
      const cols=['#00d4a0','#4a9eff','#ff6b7a'];
      const labs=['Disponible','G. Fijos','G. Variables'];
      const vals=[Math.max(bal,0),fix,vari];
      legEl.innerHTML=labs.map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${cols[i]}"></div><span>${l}: <b>${fmt(vals[i])}</b></span></div>`).join('');
    }
  }
  // bar
  const barCanvas=document.getElementById('barChart');
  if(barCanvas){
    if(barInst)barInst.destroy();
    barInst=new Chart(barCanvas,{
      type:'bar',
      data:{
        labels:['Ingresos','G. Fijos','G. Variables','Balance'],
        datasets:[{data:[inc,fix,vari,bal],backgroundColor:['#00d4a0','#4a9eff','#ff6b7a',bal>=0?'#00d4a0':'#ff6b7a'],borderRadius:8,borderSkipped:false}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},scales:{y:{ticks:{callback:v=>fmt(v),color:'#6060a0'},grid:{color:'rgba(255,255,255,.05)'}},x:{ticks:{color:'#6060a0'},grid:{display:false}}}}
    });
  }
  // task progress
  const tpEl=document.getElementById('task-progress');
  if(tpEl){
    tpEl.innerHTML='';
    AREAS.forEach(area=>{
      const tasks=state.tasks[area.id]||[];
      const done=tasks.filter(t=>t.done).length;
      const total=tasks.length;
      const pct=total?Math.round(done/total*100):0;
      const row=document.createElement('div');row.className='sum-row';
      row.innerHTML=`<div class="sum-area"><span>${area.emoji}</span><span>${area.label}</span></div><div style="flex:1;margin:0 12px"><div class="progress"><div class="progress-fill" style="width:${pct}%;background:${area.color}"></div></div></div><div class="sum-pct" style="color:${area.color}">${done}/${total}</div>`;
      tpEl.appendChild(row);
    });
    if(!AREAS.some(a=>(state.tasks[a.id]||[]).length)){tpEl.innerHTML='<div class="empty">Agrega tareas en Rutina</div>';}
  }
  updateResumen();
}

function updateResumen(){
  const {inc,fix,vari,exp,bal}=calcTotals();
  const finEl=document.getElementById('fin-summary');
  if(finEl){
    const rows=[
      ['Ingresos totales',fmt(inc),'#00d4a0'],
      ['Gastos fijos',fmt(fix),'#4a9eff'],
      ['Gastos variables',fmt(vari),'#ff6b7a'],
      ['Balance disponible',fmt(bal),bal>=0?'#00d4a0':'#ff6b7a'],
    ];
    finEl.innerHTML=rows.map(([l,v,c])=>`<div class="sum-row"><span>${l}</span><span style="font-weight:600;color:${c}">${v}</span></div>`).join('');
  }
  const rutEl=document.getElementById('rut-summary');
  if(rutEl){
    rutEl.innerHTML='';
    AREAS.forEach(area=>{
      const tasks=state.tasks[area.id]||[];
      const done=tasks.filter(t=>t.done).length;
      const total=tasks.length;
      const pct=total?Math.round(done/total*100):0;
      if(!total)return;
      const row=document.createElement('div');row.className='sum-row';
      row.innerHTML=`<div class="sum-area"><span>${area.emoji}</span><span>${area.label}</span></div><div style="flex:1;margin:0 12px"><div class="progress"><div class="progress-fill" style="width:${pct}%;background:${area.color}"></div></div></div><span style="font-size:13px;color:var(--text2)">${pct}%</span>`;
      rutEl.appendChild(row);
    });
    if(!AREAS.some(a=>(state.tasks[a.id]||[]).length)){rutEl.innerHTML='<div class="empty">Sin tareas registradas</div>';}
  }
}

function goAI(){
  const {inc,fix,vari,bal}=calcTotals();
  const totalTasks=AREAS.reduce((s,a)=>s+(state.tasks[a.id]||[]).length,0);
  const doneTasks=AREAS.reduce((s,a)=>s+(state.tasks[a.id]||[]).filter(t=>t.done).length,0);
  const msg=`Analiza mis finanzas y rutina:\n\nFinanzas:\n- Ingresos: ${fmt(inc)}\n- Gastos fijos: ${fmt(fix)}\n- Gastos variables: ${fmt(vari)}\n- Balance disponible: ${fmt(bal)}\n\nRutina de hoy:\n- Tareas completadas: ${doneTasks} de ${totalTasks}\n${AREAS.map(a=>{const t=state.tasks[a.id]||[];return `- ${a.label}: ${t.filter(x=>x.done).length}/${t.length} tareas`;}).join('\n')}\n\nDame recomendaciones concretas y personalizadas.`;
  if(typeof sendPrompt==='function')sendPrompt(msg);
}

function switchTab(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='graficas'||name==='resumen'){updateGraficas();}
}

['income','fixed','variable'].forEach(renderList);
calcTotals();
renderAreas();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
